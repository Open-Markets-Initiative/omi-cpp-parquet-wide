name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update Operating System
        run: sudo apt-get update

      - name: Install Dependencies
        run: sudo apt-get install -y cmake g++ libboost-program-options-dev libarrow-dev libparquet-dev


      - name: Clone Omi Data
        run: git clone --depth=1 https://github.com/Open-Markets-Initiative/omi-data-packets.git


      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel


      - name: Test Chicago Mercantile Exchange Simple Binary Encoding 1.8
        run: ./build/cme/cme_futures_mdp3_sbe_v1_8_cme --input omi-data-packets/Cme/Mdp3.Sbe.v1.8/MdIncrementalRefreshTradeSummary.pcap --output cme_output.parquet && test -s cme_output.parquet && rm cme_output.parquet


      - name: Test National Association of Securities Dealers Automated Quotations Itch 5.0
        run: ./build/nasdaq/nasdaq_nsmequities_totalview_itch_v5_0_nasdaq --input omi-data-packets/Nasdaq/Nasdaq.Equities.TotalView.Itch.v5.0/AddOrderMessage.pcap --output nasdaq_output.parquet && test -s nasdaq_output.parquet && rm nasdaq_output.parquet


      - name: Test Investors Exchange Investors Exchange Transport Protocol 1.6.6
        run: ./build/iex/iex_equities_tops_iextp_v1_6_6_iex --input omi-data-packets/Iex/Tops.IexTp.v1.6/TradeReportMessage.pcap --output iex_output.parquet && test -s iex_output.parquet && rm iex_output.parquet


      - name: Test Securities Industry Automation Corporation Opra Binary Interface 6.2
        run: ./build/siac/siac_opra_recipient_obi_v6_2_siac --input omi-data-packets/Siac/Opra.Recipient.v6.2/BestBidAppendageMessage.pcap --output siac_output.parquet && test -s siac_output.parquet && rm siac_output.parquet


      - name: Unit Tests
        run: cd build && ctest --output-on-failure


